<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="night" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.2" />
      <stop offset="30%" style="stop-color:#6c5ce7;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#a29bfe;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-wide">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#night)" rx="12" />

  <!-- Stars (subtle) -->
  <circle cx="120" cy="45" r="1" fill="#a29bfe" opacity="0.4" />
  <circle cx="680" cy="30" r="1.2" fill="#a29bfe" opacity="0.3" />
  <circle cx="350" cy="25" r="0.8" fill="#6c5ce7" opacity="0.5" />
  <circle cx="520" cy="50" r="1" fill="#a29bfe" opacity="0.3" />
  <circle cx="230" cy="60" r="0.8" fill="#6c5ce7" opacity="0.4" />
  <circle cx="620" cy="65" r="1" fill="#a29bfe" opacity="0.25" />
  <circle cx="75" cy="80" r="0.6" fill="#a29bfe" opacity="0.35" />
  <circle cx="740" cy="75" r="0.8" fill="#6c5ce7" opacity="0.3" />

  <!-- Crescent moon -->
  <circle cx="680" cy="80" r="24" fill="#1a1a3a" stroke="#6c5ce7" stroke-width="1" opacity="0.6" />
  <circle cx="680" cy="80" r="22" fill="none" stroke="#a29bfe" stroke-width="0.5" opacity="0.3" />
  <circle cx="690" cy="74" r="20" fill="#0a0a14" /> <!-- shadow to make crescent -->
  <circle cx="675" cy="82" r="2" fill="#a29bfe" opacity="0.15" filter="url(#glow-wide)" />

  <!-- EEG brain wave - Phase 1 (surface) -->
  <path d="M 60 165 Q 80 165 100 165 L 120 165 Q 135 165 145 155 Q 155 145 165 165 Q 170 175 180 165 L 220 165 Q 230 165 240 150 Q 250 135 260 165 Q 265 180 275 165 L 300 165"
        stroke="#6c5ce7" stroke-width="1.5" fill="none" opacity="0.7" filter="url(#glow)" />

  <!-- EEG brain wave - Phase 2 (structural) - more active -->
  <path d="M 300 165 Q 310 165 320 145 Q 325 135 330 155 Q 335 170 340 140 Q 345 115 350 155 Q 355 180 360 150 Q 365 130 370 160 Q 375 175 385 150 Q 395 130 405 165 Q 410 175 420 145 Q 425 130 430 160 Q 435 175 445 165 L 470 165"
        stroke="#a29bfe" stroke-width="2" fill="none" opacity="0.9" filter="url(#glow)" />

  <!-- EEG brain wave - Phase 3 (semantic) - deep waves -->
  <path d="M 470 165 Q 480 165 490 155 Q 500 145 510 170 Q 520 190 535 145 Q 545 115 555 170 Q 565 200 580 140 Q 590 105 600 165 Q 610 200 625 150 Q 635 120 650 165 L 680 165 Q 700 165 720 165 L 740 165"
        stroke="#6c5ce7" stroke-width="1.8" fill="none" opacity="0.6" filter="url(#glow)" />

  <!-- Phase labels along the wave -->
  <text x="180" y="200" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#6c5ce7" opacity="0.5">P1 surface</text>
  <text x="350" y="200" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#a29bfe" opacity="0.6">P2 structural</text>
  <text x="545" y="200" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#6c5ce7" opacity="0.5">P3 semantic</text>

  <!-- Memory nodes along the wave (like synapses firing) -->
  <!-- Fixed nodes -->
  <circle cx="165" cy="165" r="3" fill="#00ff88" opacity="0.8" filter="url(#glow)" />
  <circle cx="260" cy="165" r="3" fill="#00ff88" opacity="0.8" filter="url(#glow)" />
  <circle cx="350" cy="140" r="3.5" fill="#00ff88" opacity="0.9" filter="url(#glow)" />
  <circle cx="420" cy="145" r="3" fill="#00ff88" opacity="0.8" filter="url(#glow)" />
  <circle cx="535" cy="145" r="3.5" fill="#00ff88" opacity="0.9" filter="url(#glow)" />

  <!-- Flagged nodes -->
  <circle cx="330" cy="155" r="3" fill="#ffbe0b" opacity="0.7" filter="url(#glow)" />
  <circle cx="555" cy="170" r="3" fill="#ffbe0b" opacity="0.7" filter="url(#glow)" />
  <circle cx="625" cy="150" r="3" fill="#ffbe0b" opacity="0.7" filter="url(#glow)" />

  <!-- Closed eye (stylized) -->
  <path d="M 340 100 Q 400 125 460 100" stroke="#a29bfe" stroke-width="1.5" fill="none" opacity="0.4" />
  <path d="M 365 108 L 360 118" stroke="#a29bfe" stroke-width="1" opacity="0.25" />
  <path d="M 390 113 L 388 123" stroke="#a29bfe" stroke-width="1" opacity="0.25" />
  <path d="M 415 112 L 415 122" stroke="#a29bfe" stroke-width="1" opacity="0.25" />
  <path d="M 440 107 L 443 117" stroke="#a29bfe" stroke-width="1" opacity="0.25" />

  <!-- Title -->
  <text x="400" y="290" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="56" font-weight="700" fill="#a29bfe" filter="url(#glow)">codeREM</text>

  <!-- Tagline -->
  <text x="400" y="330" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#8b949e" letter-spacing="2">MEMORY CONSOLIDATION WHILE YOU SLEEP</text>

  <!-- Legend -->
  <circle cx="245" cy="370" r="4" fill="#00ff88" opacity="0.8" />
  <text x="255" y="374" font-family="monospace" font-size="10" fill="#8b949e">fixed</text>
  <circle cx="315" cy="370" r="4" fill="#ffbe0b" opacity="0.7" />
  <text x="325" y="374" font-family="monospace" font-size="10" fill="#8b949e">flagged</text>
  <text x="395" y="374" font-family="monospace" font-size="10" fill="#6c5ce7" opacity="0.6">P1</text>
  <text x="420" y="374" font-family="monospace" font-size="10" fill="#a29bfe" opacity="0.8">P2</text>
  <text x="445" y="374" font-family="monospace" font-size="10" fill="#6c5ce7" opacity="0.6">P3</text>
  <text x="470" y="374" font-family="monospace" font-size="10" fill="#8b949e">phases</text>
</svg>
